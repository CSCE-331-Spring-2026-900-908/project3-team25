<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Dashboard | Reveille Bubble Tea</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="accessibility-toolbar" aria-label="Accessibility controls">
    <button id="voiceGuideToggle" class="access-btn" type="button" aria-pressed="false">Voice Guide: Off</button>
    <button id="contrastToggle" class="access-btn" type="button" aria-pressed="false">High Contrast: Off</button>
    <button id="motionToggle" class="access-btn" type="button" aria-pressed="false">Reduce Motion: Off</button>
  </div>

  <div class="ambient-bg" aria-hidden="true">
  <span class="light light-1"></span>
  <span class="light light-2"></span>
  <span class="light light-3"></span>
</div>
  <div id="youtube-player" style="position: fixed; left: -9999px; width: 1px; height: 1px;"></div>
  <button id="musicMuteBtn" class="music-toggle" type="button" aria-label="Toggle background music">Unmute Music</button>

  <main id="main-content" class="page-shell">
    <header class="brand-strip">
      <div class="brand-lockup">
        <div class="brand-badge">RB</div>
        <div>
          <h1>Manager Dashboard</h1>
          <p>Back-office desktop view</p>
        </div>
      </div>
      <div class="tag-row">
        <span class="tag">Keyboard and mouse</span>
        <span class="tag">Private office setting</span>
        <span class="tag">Inventory-focused</span>
      </div>
    </header>

    <section class="metric-grid" id="metric-grid">
      <article class="metric"><div class="value">--</div><small>Loading...</small></article>
    </section>

    <section class="portal-grid">
      <section class="summary-stack">
        <article class="portal-card">
          <h2 style="margin-top:0;">Low stock watchlist</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Item</th>
                  <th>On hand</th>
                  <th>Threshold</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="inventory-table-body"></tbody>
            </table>
          </div>
        </article>

        <article class="portal-card">
          <h2 style="margin-top:0;">Recent orders</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Cashier</th>
                  <th>Total</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="recent-orders-body"></tbody>
            </table>
          </div>
        </article>

        <article class="portal-card">
          <h2 style="margin-top:0;">System notes</h2>
          <ul id="announcements" class="notice-list"></ul>
        </article>
      </section>

      <aside class="summary-stack">
        <article class="promo-card">
          <h3 style="margin-top:0;">Menu category breakdown</h3>
          <section class="metric-grid" id="category-grid"></section>
        </article>
      </aside>
    </section>
  </main>

  <script src="/js/manager.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/music.js"></script>
  <script src="/js/accessibility.js"></script>
</body>
</html>
