<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Dashboard | Reveille Bubble Tea</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="accessibility-toolbar" aria-label="Accessibility controls">
    <button id="voiceGuideToggle" class="access-btn" type="button" aria-pressed="false">Voice Guide: Off</button>
  </div>

  <main id="main-content" class="page-shell">
    <header class="brand-strip">
      <div class="brand-lockup">
        <div class="brand-badge">RB</div>
        <div>
          <h1>Manager Dashboard</h1>
        </div>
      </div>
      <div class="cashier-topbar-right">
        <span class="cashier-user-info">Manager Dashboard</span>
        <a href="/" class="btn ghost cashier-portal-link">Portal</a>
      </div>
    </header>

    <section class="metric-grid" id="metric-grid">
      <article class="metric"><div class="value">--</div><small>Loading...</small></article>
    </section>

    <section class="portal-grid">
      <section class="summary-stack">
        <article class="portal-card">
          <h2 style="margin-top:0;">Low stock watchlist</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Item</th>
                  <th>On hand</th>
                  <th>Threshold</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="inventory-table-body"></tbody>
            </table>
          </div>
        </article>

        <article class="portal-card">
          <h2 style="margin-top:0;">Recent orders</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Cashier</th>
                  <th>Total</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="recent-orders-body"></tbody>
            </table>
          </div>
        </article>

        <article class="portal-card">
          <h2 style="margin-top:0;">Notes</h2>
          <ul id="announcements" class="notice-list"></ul>
        </article>
      </section>

      <aside class="summary-stack">
        <article class="promo-card">
          <h3 style="margin-top:0;">Menu category breakdown</h3>
          <section class="metric-grid" id="category-grid"></section>
        </article>
      </aside>
    </section>
  </main>

  <script src="/js/manager.js"></script>
  <script src="/js/accessibility.js"></script>
</body>
</html>
