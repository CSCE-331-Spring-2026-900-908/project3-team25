<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Board | Reveille Bubble Tea</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="ambient-bg" aria-hidden="true">
    <span class="light light-1"></span>
    <span class="light light-2"></span>
    <span class="light light-3"></span>
  </div>
  <div id="youtube-player" style="position: fixed; left: -9999px; width: 1px; height: 1px;"></div>
  <button id="musicMuteBtn" class="music-toggle" type="button">Mute Music</button>

  <main id="main-content" tabindex="-1" class="restaurant-shell">

    <header class="cashier-topbar" style="margin-bottom: 24px;">
      <div class="brand-mark">
        <div class="brand-badge">RB</div>
        <div>
          <h1 style="margin:0; font-size:1.3rem;">Reveille Bubble Tea</h1>
          <p class="muted" style="margin:2px 0 0;">Menu Board</p>
        </div>
      </div>
      <a href="/" class="btn ghost cashier-portal-link">Portal</a>
    </header>

    <div class="board-columns" id="menu-board-columns">
      <article class="board-panel">
        <h3>Loading menu…</h3>
      </article>
    </div>

  </main>

  <script src="/js/menu-board.js"></script>
  <script src="/js/accessibility.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/music.js"></script>
</body>
</html>
