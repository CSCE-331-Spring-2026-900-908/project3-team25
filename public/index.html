<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reveille Bubble Tea</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="accessibility-toolbar" aria-label="Accessibility controls">
    <button id="voiceGuideToggle" class="access-btn" type="button" aria-pressed="false" data-tooltip="Voice Guide: Off">🔇</button>
  </div>

  <main id="main-content" class="page-shell">

    <header class="portal-header">
      <div class="brand-mark">
        <div class="brand-badge">RB</div>
        <div>
          <h1>Reveille Bubble Tea</h1>
          <p class="muted">Team 25</p>
        </div>
      </div>
      <div id="auth-status" class="portal-auth"></div>
    </header>

    <p id="portal-access-message" class="muted portal-access-msg"></p>

    <!-- Role-aware dashboard injected by auth.js -->
    <div id="role-dashboard"></div>

  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/accessibility.js"></script>
</body>
</html>
