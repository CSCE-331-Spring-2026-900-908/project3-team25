<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reveille Bubble Tea</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="ambient-bg" aria-hidden="true">
    <span class="light light-1"></span>
    <span class="light light-2"></span>
    <span class="light light-3"></span>
  </div>

  <div id="youtube-player" style="position: fixed; left: -9999px; width: 1px; height: 1px;"></div>
  <button id="musicMuteBtn" class="music-toggle" type="button">Mute Music</button>

  <main class="page-shell">

    <!-- Header -->
    <header class="portal-header">
      <div class="brand-mark">
        <div class="brand-badge">RB</div>
        <div>
          <h1>Reveille Bubble Tea</h1>
          <p class="muted">Team 25</p>
        </div>
      </div>
      <div id="auth-status" class="portal-auth">
        <p class="muted">Checking sign-in status…</p>
      </div>
    </header>

    <p id="portal-access-message" class="muted portal-access-msg"></p>

    <!-- Interface cards -->
    <div class="portal-launch-grid">

      <article class="portal-launch-card">
        <div class="portal-launch-icon">🧋</div>
        <h2>Customer Kiosk</h2>
        <p class="muted">Self-order station for customers</p>
        <a href="/customer.html" class="btn portal-launch-btn">Open Kiosk</a>
      </article>

      <article class="portal-launch-card">
        <div class="portal-launch-icon">🖥️</div>
        <h2>Cashier POS</h2>
        <p class="muted">Counter terminal for staff</p>
        <a href="/cashier.html" class="btn portal-launch-btn" id="portal-cashier-link">Cashier POS</a>
      </article>

      <article class="portal-launch-card">
        <div class="portal-launch-icon">📋</div>
        <h2>Menu Board</h2>
        <p class="muted">Lobby display screen</p>
        <a href="/menu-board.html" class="btn portal-launch-btn">Open Board</a>
      </article>

      <article class="portal-launch-card">
        <div class="portal-launch-icon">📊</div>
        <h2>Manager</h2>
        <p class="muted">Dashboard and analytics</p>
        <a href="/manager.html" class="btn portal-launch-btn" id="portal-manager-link">Manager View</a>
      </article>

    </div>

  </main>

  <script src="/js/auth.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/music.js"></script>
</body>
</html>
