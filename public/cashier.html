<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashier POS | Reveille Bubble Tea</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="ambient-bg" aria-hidden="true">
    <span class="light light-1"></span>
    <span class="light light-2"></span>
    <span class="light light-3"></span>
  </div>

  <div id="youtube-player" style="position: fixed; left: -9999px; width: 1px; height: 1px;"></div>

  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="accessibility-toolbar" aria-label="Accessibility controls">
    <button id="voiceGuideToggle" class="access-btn" type="button" aria-pressed="false">Voice Guide: Off</button>
    <button id="musicMuteBtn" class="music-toggle" type="button" aria-label="Toggle background music" title="Toggle background music">🔇</button>
  </div>

  <div class="cashier-modify-overlay hidden" id="cashier-modify-overlay">
    <div class="modify-card" id="cashier-modify-card">
      <!-- injected by cashier.js -->
    </div>
  </div>

  <main id="main-content" class="restaurant-shell">

    <header class="cashier-topbar">
      <span class="cashier-user-info">Logged in as: <strong id="cashier-user-name">—</strong></span>
      <div class="cashier-topbar-right">
        <span class="cashier-user-info">Cashier POS</span>
        <a href="/" class="btn ghost cashier-portal-link">Portal</a>
      </div>
    </header>

    <div class="cashier-workspace">

      <section class="cashier-cart-panel">
        <div class="cashier-cart-header">
          <h2>Current Order</h2>
          <span class="badge" id="cashier-item-count">0 items</span>
        </div>

        <div class="cashier-cart-scroll">
          <p class="cashier-cart-empty" id="cashier-cart-empty">No drinks added yet.</p>
          <table class="cashier-cart-table" id="cashier-cart-table" style="display:none;">
            <thead>
              <tr>
                <th>Item</th>
                <th class="col-center">Qty</th>
                <th class="col-right">$</th>
                <th class="col-center">Sweet</th>
                <th class="col-center">Ice</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="cashier-cart-body"></tbody>
          </table>
        </div>

        <div class="cashier-cart-footer">
          <div class="summary-box" style="margin:0; padding:12px 14px; gap:7px;">
            <div class="summary-row"><span>Subtotal</span><strong id="cashier-subtotal">$0.00</strong></div>
            <div class="summary-row"><span>Tax (8.25%)</span><strong id="cashier-tax">$0.00</strong></div>
            <div class="summary-row total"><span>Total</span><strong id="cashier-total">$0.00</strong></div>
          </div>

          <div class="cashier-pay-select">
            <label for="cashier-payment-method">Payment</label>
            <select id="cashier-payment-method">
              <option value="card">Card</option>
              <option value="applepay">Apple Pay</option>
              <option value="cash">Cash</option>
            </select>
          </div>

          <div class="cashier-cart-actions">
            <button class="btn cashier-checkout-btn" id="cashier-pay-btn">Checkout</button>
            <button class="btn ghost" id="cashier-remove-btn">Remove Item</button>
            <button class="btn ghost" id="cashier-clear-btn">Clear All</button>
          </div>

          <p class="cashier-checkout-status" id="cashier-checkout-result"></p>
        </div>
      </section>

      <nav class="cashier-cat-col" id="cashier-cat-col" aria-label="Menu categories">
        <!-- injected by cashier.js -->
      </nav>

      <div class="cashier-product-area">
        <div class="cashier-product-grid" id="cashier-product-grid">
          <!-- injected by cashier.js -->
        </div>
      </div>

    </div>

    <div class="cashier-bottom-bar">
      <span class="cashier-mod-label">Modify selected:</span>
      <button class="btn ghost mod-btn" id="mod-half-sweet">Half Sweet</button>
      <button class="btn ghost mod-btn" id="mod-2x-sweet">2x Sweet</button>
      <button class="btn ghost mod-btn" id="mod-half-ice">Half Ice</button>
      <button class="btn ghost mod-btn" id="mod-no-ice">No Ice</button>
      <button class="btn ghost mod-btn" id="mod-extra-boba">Extra Boba (+$0.75)</button>
      <div class="mod-sep"></div>
      <button class="btn mod-primary-btn" id="mod-modify-btn">Modify ▸</button>
    </div>

    <section class="helper-grid two-col">
      <article class="helper-card">
        <h3>Customer Translation</h3>
        <div class="button-row">
          <input id="cashier-translate-text" value="Would you like extra boba?" aria-label="Translate text" />
          <select id="cashier-translate-target" aria-label="Translate target language">
            <option value="es">Spanish</option>
            <option value="ar">Arabic</option>
            <option value="zh">Chinese</option>
          </select>
        </div>
        <div class="button-row" style="margin-top:10px;">
          <button class="btn" id="cashier-translate-btn">Translate</button>
        </div>
        <p id="cashier-translate-result" class="muted">Translation result appears here.</p>
      </article>

      <article class="helper-card">
        <h3>Assistant Shortcut</h3>
        <div class="button-row">
          <input id="cashier-assistant-input" placeholder="What is popular?" aria-label="Ask assistant" />
          <button class="btn" id="cashier-assistant-btn">Ask</button>
        </div>
        <p id="cashier-assistant-result" class="muted">Assistant reply appears here.</p>
      </article>
    </section>

  </main>

  <script src="/js/cashier.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/music.js"></script>
  <script src="/js/accessibility.js"></script>
</body>
</html>
